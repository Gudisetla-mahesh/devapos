apiVersion: apps/v1
kind: Deployment
metadata:
    name: my-app
spec:
    replicas: 3
    selector:
      matchLabels:
         app: my-app
    template:
      metadata:
         labels:
           app: my-app
      spec:
         containers:
         - name: my-app
           image: nginx:latest
           ports:
           -  containerPort: 8080
           resources:
              requests:
                cpu: "250m"
                memory: "128Mi"
              limits:
                cpu: "500m"
                memory: "256Mi"
           livenessProbe:
              httpGet:
                path: /
                port: 8080
              initialDelaySeconds: 10
              periodSeconds: 10
           readinessProbe:
              httpGet:
                path: /
                port: 8080
              initialDelaySeconds: 5
              periodSeconds: 5
 
